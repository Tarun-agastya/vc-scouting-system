# ══════════════════════════════════════════════════════════════════════════
# VC Scouting — Tuning Knobs (Phase S-2)
# ══════════════════════════════════════════════════════════════════════════
#
# Business rules that used to be hardcoded in Python. Edit here to change what
# the pipeline extracts, what it pre-filters, and how it scores — no code change.
# Re-read fresh whenever the file changes (cached by modification time, so
# per-chunk reads stay fast). A broken edit falls back to the last good version,
# then to built-in defaults — the pipeline never crashes on a bad edit here.
#
# ── Sections ─────────────────────────────────────────────────────────────
#   extraction        — what the LLM should INCLUDE / EXCLUDE when extracting
#   candidate_filter  — the cheap pre-LLM relevance filter (keywords + thresholds)
#   scoring           — source-quality weights, diversity bonuses, tier cutoffs
# ══════════════════════════════════════════════════════════════════════════

extraction:
  # One sentence describing what counts as a target company.
  include: >-
    any company founded in the past 20 years operating in technology, software,
    AI, hardware, fintech, climatetech, deeptech, proptech, logistics, or B2B SaaS
    — regardless of funding stage or size. VC-backed companies, unicorns, and
    growth-stage companies are all valid targets.
  # Bullet rules for what to leave out. Add/remove lines to change policy
  # (e.g. delete the medicine/biotech line to start tracking healthtech).
  exclude:
    - "Traditional incumbents: established non-tech corporations such as car makers, banks, industrial conglomerates (e.g. BMW, Deutsche Bank, Siemens, McKinsey, SAP if founded before 2000)."
    - "VC firms, investment funds, accelerators, media outlets."
    - "Companies in medicine, biotech, e-commerce, or food retail (exception: packaging technology)."
    - "Companies headquartered/founded outside Europe (e.g. US, China, other Asia, elsewhere) — UNLESS the text explicitly states the company is expanding into, opening an office in, or specifically targeting the DACH/European market. Being mentioned in a German or European publication purely as general industry news or founder-profile commentary is NOT sufficient reason to include a non-European company — e.g. a German newsletter profiling a Chinese AI lab's founder is industry commentary, not a DACH/Europe startup to track."


candidate_filter:
  # A text chunk must match at least `min_score` of the 4 signal groups AND
  # have at least `min_words` words to be sent to the LLM.
  min_score: 2
  min_words: 25
  # Each group is a list of terms/regex-fragments joined into one alternation
  # and matched case-insensitively with word boundaries. Plain words work fine;
  # advanced entries (e.g. "series\\s+[a-c]") are matched as regex.
  signals:
    startup:
      - startup
      - start-up
      - founded
      - co-founded
      - founder
      - ceo
      - cto
      - coo
      - cpo
      - managing\s+director
      - geschäftsführer
      - raised
      - funding
      - funded
      - investment
      - investor
      - venture
      - seed
      - series\s+[a-c]
      - pre-seed
      - post-seed
      - scale-up
      - scaleup
      - unicorn
      - soonicorn
      - accelerat
      - incubat
      - portfolio
      - spin-?off
      - spin-?out
      - pitch
      - traction
      - mrr
      - arr
      - runway
      - exit
      - ipo
    geo:
      - germany
      - deutschland
      - german
      - austria
      - österreich
      - austrian
      - switzerland
      - schweiz
      - swiss
      - munich
      - münchen
      - berlin
      - hamburg
      - frankfurt
      - cologne
      - köln
      - stuttgart
      - augsburg
      - nuremberg
      - nürnberg
      - düsseldorf
      - vienna
      - wien
      - graz
      - salzburg
      - linz
      - zurich
      - zürich
      - basel
      - geneva
      - genf
      - bern
      - europe
      - european
      - dach
    tech:
      - platform
      - software
      - saas
      - paas
      - api
      - sdk
      - ai
      - ml
      - llm
      - deep\s*learning
      - machine\s*learning
      - algorithm
      - autonomous
      - automation
      - cloud
      - data
      - analytics
      - dashboard
      - sensor
      - hardware
      - robot
      - drone
      - iot
      - marketplace
      - fintech
      - climatetech
      - proptech
      - insurtech
      - b2b
      - b2c
      - b2g
      - enterprise
      - product
      - solution
      - technology
      - digital
    company:
      - GmbH
      - AG
      - UG
      - Ltd
      - Inc
      - company
      - companies
      - firm
      - enterprise
      - venture
      - team


# ══════════════════════════════════════════════════════════════════════════
# Geo-scope hard filter (23 Jul) — deterministic backstop, not a prompt rule
# ══════════════════════════════════════════════════════════════════════════
# The extraction prompt's exclude rules alone don't reliably stop the small
# extraction model from pulling in companies outside our DACH/Europe scope —
# confirmed live: a German-newsletter profile of a Chinese AI founder
# (Moonshot AI) was still extracted despite an explicit "exclude non-Europe"
# prompt rule. Same lesson as Phase H-1's grounding gate: don't just tell the
# model, build a deterministic check.
#
# A chunk is REJECTED before ever reaching the LLM if it contains a clear
# non-Europe signal AND has no DACH/Europe geo signal at all (reusing
# candidate_filter.signals.geo above as the carve-out — a real "expanding to
# Europe" story naturally mentions a specific European place, e.g. "opening
# a Berlin office", so it passes through untouched). This is a hard reject,
# independent of the min_score check above.
geo_scope:
  enabled: true
  non_europe_signals:
    - china
    - chinese
    - beijing
    - shanghai
    - shenzhen
    - hong kong
    - india
    - indian
    - bangalore
    - mumbai
    - japan
    - japanese
    - tokyo
    - south korea
    - korean
    - seoul
    - singapore
    - silicon valley
    - san francisco


scoring:
  # Best source-type contribution (Category A). Unknown types default to 4.
  source_type_score:
    accelerator: 20
    incubator: 20
    university_hub: 20
    startup_network: 12
    intelligence_platform: 12
    newsletter: 8
    rss: 4
    general: 4
  # Base trust of the primary source (source_confidence). Unknown default 10.
  source_confidence_base:
    accelerator: 45
    incubator: 45
    university_hub: 45
    startup_network: 30
    intelligence_platform: 30
    newsletter: 20
    rss: 10
    general: 10
  # Bonus indexed by min(unique_sources, 4): [0 srcs, 1, 2, 3, 4+]
  diversity_bonus:      [0, 0, 6, 10, 15]
  conf_diversity_bonus: [0, 0, 15, 25, 30]
  # Tier cutoffs, highest first: [min_score, label]
  tiers:
    - [81, PRIORITY]
    - [61, HIGH_QUALITY_LEAD]
    - [41, INTERESTING]
    - [21, EARLY_DISCOVERY]
    - [0, WEAK_SIGNAL]


# ══════════════════════════════════════════════════════════════════════════
# Phase H-1 — Source-grounding gate (hallucination cut)
# ══════════════════════════════════════════════════════════════════════════
# Deterministic, free, no-LLM check applied right after every extraction
# (reasoning/qwen_client.py::extract_startups). A high-fabrication-risk field
# is nulled unless the chunk it came from actually contains evidence for it.
# Paraphrased/classified fields (description, industry, tech_cluster, city,
# country) are NOT gated here — nulling a correct paraphrase would violate
# "gather the correct information"; those are left to the Phase H-3 LLM
# deep-recheck instead.
#
# Set enabled: false to disable the whole gate (pre-Phase-H behavior — trust
# the model's raw output). Each check_* toggle disables just that one field.
grounding:
  enabled: true

  check_founded_year: true    # the 4-digit year must appear literally in the chunk
  check_funding_stage: true   # the stage value itself (e.g. "Seed") must appear
  check_funding_amount: true  # needs BOTH a digit AND one of funding_amount_signals
  check_employee_count: true  # needs one of employee_count_signals nearby
  check_founders: true        # each founder's surname must appear in the chunk

  # Reference vocabulary for the funding_stage check (bilingual EN/DE) —
  # informational; the actual check matches the extracted value's own text.
  funding_stage_keywords:
    - pre-seed
    - preseed
    - vor-seed
    - vorseed
    - seed
    - series a
    - series b
    - series c
    - series d
    - series e
    - growth
    - angel
    - bridge
    - wachstumskapital
    - wachstumsrunde

  funding_amount_signals:
    - million
    - mio
    - billion
    - bn
    - thousand
    - tsd
    - €
    - "$"
    - usd
    - eur
    - dollar
    - euro
    - funding
    - raised
    - investment
    - eingesammelt
    - finanzierung
    - kapital
    - runde

  # Deliberately NOT "people" alone — found via Phase H-4 live testing to
  # false-positive-match unrelated text (e.g. the "Pitch & People" podcast
  # name), which let a fabricated employee_count survive grounding just
  # because a source article happened to mention that show's name.
  employee_count_signals:
    - employee
    - employees
    - headcount
    - staff
    - fte
    - team of
    - person team
    - people on the team
    - headcount of
    - mitarbeiter
    - beschäftigte
    - belegschaft
    - mann team
    - köpfe
