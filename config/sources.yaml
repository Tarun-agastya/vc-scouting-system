# ══════════════════════════════════════════════════════════════════════════
# VC Scouting — Live Source Registry
# ══════════════════════════════════════════════════════════════════════════
#
# This file controls WHAT the pipeline scans. It is re-read fresh on every
# ingestion run — no restart, no code change, no deploy needed to add or
# remove a source.
#
# You can edit this file directly, or use the "Add source" form in the
# team dashboard (which writes here for you). Comments (like this one) are
# preserved when the dashboard edits the file.
#
# If you break the YAML syntax, the pipeline will NOT crash — it logs an
# error and keeps using the last version that worked, until this file is
# fixed. Still, try to keep the indentation consistent (use spaces, not tabs).
#
# ── Sections ─────────────────────────────────────────────────────────────
#   rss_feeds              — news/blog RSS feeds to poll
#   web_sources             — accelerator / incubator / university portfolio pages to scrape
#   newsletter_senders      — optional allowlist of trusted newsletter senders
#                             (leave empty to accept all senders in the inbox —
#                             relevance is still filtered by content downstream)
#   newsletter_search_terms — Gmail subject-line keywords used to find newsletters
# ══════════════════════════════════════════════════════════════════════════

rss_feeds:
  - name: EU-Startups
    url: https://eu-startups.com/feed/
    region: europe
    type: directory

  - name: Sifted
    url: https://sifted.eu/feed
    region: europe
    type: news

  - name: Tech.eu
    url: https://tech.eu/feed/
    region: europe
    type: news

  - name: Gruenderszene
    url: https://www.gruenderszene.de/feed
    region: dach
    type: news

  - name: StartupTicker.ch
    url: https://www.startupticker.ch/en/news/rss-feed
    region: dach
    type: news


