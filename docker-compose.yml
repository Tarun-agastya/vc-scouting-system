version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vc_scouting
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scoutpass123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout -d vc_scouting"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vc_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
