<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCOUT — GreenTech Hub</title>
  <link rel="icon" href="assets/logo-lime.svg">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app">
    <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img class="brand__logo" src="assets/logo-lime.svg" alt="">
        <div>
          <div class="brand__name">SCOUT</div>
          <div class="brand__sub">GreenTech Hub</div>
        </div>
      </div>

      <nav class="col" style="gap:2px">
        <a class="nav__item" data-route="overview" href="#/overview">
          <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
            <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
          </svg>
          Overview
        </a>
        <a class="nav__item" data-route="browse" href="#/browse">
          <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/>
          </svg>
          Browse &amp; Search
        </a>
        <a class="nav__item" data-route="reviews" href="#/reviews">
          <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3 7-7"/><path d="M20 12v7a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1h9"/>
          </svg>
          Review Inbox
          <span class="nav__badge hidden" id="nav-review-count">0</span>
        </a>
        <a class="nav__item" data-route="ingestion" href="#/ingestion">
          <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 20h16"/>
          </svg>
          Ingestion
          <span class="dot dot--idle hidden" id="nav-ingest-dot" style="margin-left:auto"></span>
        </a>
        <a class="nav__item" data-route="sources" href="#/sources">
          <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/>
            <path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/>
          </svg>
          Sources
        </a>
      </nav>

      <div class="nav__spacer"></div>

      <div class="row dim" style="padding:8px;font-size:11px;gap:6px">
        <span class="dot dot--idle" id="health-dot"></span>
        <span id="health-text">connecting…</span>
      </div>
    </aside>

    <!-- ── Main ────────────────────────────────────────────────────────── -->
    <div class="main">
      <header class="topbar">
        <button class="btn btn--ghost btn--sm" id="menu-btn" aria-label="Menu"
                style="display:none">☰</button>
        <div class="topbar__title" id="topbar-title">Overview</div>
        <div class="topbar__right">
          <button class="btn btn--ghost btn--sm" id="theme-btn" title="Toggle theme" aria-label="Toggle theme">
            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>
            </svg>
          </button>
        </div>
      </header>

      <main class="content" id="view"></main>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
